name: ci

# Version policy: action majors (checkout@v7, setup-go@v6, setup-node@v6,
# golangci-lint-action@v9) are the latest known-good as of 2026-07 —
# bump to the current majors when touching this file if newer exist.

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: apps/api/go.sum
      - name: Lint (zero warnings policy)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/api
      - name: Tests (includes testcontainers integration)
        run: go test ./...
      - name: govulncheck (version policy gate)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: apps/api/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install workspace deps
        run: npm ci
      - name: npm audit (version policy gate)
        run: npm audit --audit-level=high
      - name: sqlc drift check
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code
      - name: OpenAPI + orval drift check
        run: |
          make openapi
          npm run generate -w packages/api-client
          git diff --exit-code
      - name: Typecheck generated client
        run: npm run typecheck -w packages/api-client

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build API image
        run: docker build -f deploy/Dockerfile.api .
